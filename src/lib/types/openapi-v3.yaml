openapi: 3.0.0
info:
  title: api/models/account.proto
  version: version not set
tags:
  - name: StorageService
  - name: AssetService
  - name: AuthService
  - name: MessengerService
  - name: PortfolioService
  - name: PriceService
  - name: RuleService
  - name: UserService
paths:
  /api/v1/accounts:
    get:
      operationId: StorageService_ListAccounts
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListAccountsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: userId
          description: Filter by user
          in: query
          required: false
          schema:
            type: string
        - name: type
          description: Filter by AccountType
          in: query
          required: false
          schema:
            type: string
            enum:
              - ACCOUNT_TYPE_UNSPECIFIED
              - ACCOUNT_TYPE_WALLET
              - ACCOUNT_TYPE_EXCHANGE
              - ACCOUNT_TYPE_BANK
              - ACCOUNT_TYPE_BROKER
            default: ACCOUNT_TYPE_UNSPECIFIED
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
      tags:
        - StorageService
    post:
      summary: --- Account operations ---
      operationId: StorageService_CreateAccount
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAccount"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsAccount"
        description: user_id, name, type required. ID empty.
        required: true
      tags:
        - StorageService
  "/api/v1/accounts/{account.id}":
    put:
      operationId: StorageService_UpdateAccount
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAccount"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: account.id
          description: Unique identifier (UUID)
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  title: ID of the user owning this account
                name:
                  type: string
                  title: User-defined name (e.g., "My Binance Spot", "Ledger Nano S")
                description:
                  type: string
                  title: Optional longer description
                type:
                  $ref: "#/components/schemas/modelsAccountType"
                data:
                  type: object
                  additionalProperties:
                    type: string
                  description: Flexible map for connection parameters, API keys, addresses etc.
                    Needs careful handling due to sensitive data.
                createdAt:
                  type: string
                  format: date-time
                  title: Timestamp of creation
                updatedAt:
                  type: string
                  format: date-time
                  title: Timestamp of last update
              title: Must include ID and fields to update
        description: Must include ID and fields to update
        required: true
      tags:
        - StorageService
  "/api/v1/accounts/{id}":
    get:
      operationId: StorageService_GetAccount
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAccount"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
    delete:
      operationId: StorageService_DeleteAccount
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                type: object
                properties: {}
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
  /api/v1/assets:
    get:
      operationId: StorageService_ListAssets
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListAssetsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: pageSize
          description: Number of assets to return
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageToken
          description: Token for fetching the next page
          in: query
          required: false
          schema:
            type: string
        - name: tags
          description: Filter by tags
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
      tags:
        - StorageService
    post:
      summary: --- Asset operations ---
      operationId: StorageService_CreateAsset
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAsset"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsAsset"
        description: ID might be empty if generated server-side
        required: true
      tags:
        - StorageService
  "/api/v1/assets/{asset.id}":
    put:
      operationId: StorageService_UpdateAsset
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAsset"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: asset.id
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          description: Specifies which fields to update
          in: query
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  $ref: "#/components/schemas/modelsAssetType"
                symbol:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                createdAt:
                  type: string
                  format: date-time
                updatedAt:
                  type: string
                  format: date-time
              title: Must include ID and fields to update
        description: Must include ID and fields to update
        required: true
      tags:
        - StorageService
  "/api/v1/assets/{assetId}/enrich":
    post:
      summary: "Example business logic method: Fetches data from external sources and
        updates the asset info."
      operationId: AssetService_EnrichAssetData
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAsset"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetServiceEnrichAssetDataBody"
        required: true
      tags:
        - AssetService
  "/api/v1/assets/{assetId}/similar":
    get:
      summary: "Example: Find assets similar to a given one based on tags, type, etc."
      operationId: AssetService_FindSimilarAssets
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListAssetsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: assetId
          description: Find assets similar to this one
          in: path
          required: true
          schema:
            type: string
        - name: limit
          description: Max number of similar assets to return
          in: query
          required: false
          schema:
            type: integer
            format: int32
      tags:
        - AssetService
  "/api/v1/assets/{id}":
    get:
      operationId: StorageService_GetAsset
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsAsset"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
    delete:
      operationId: StorageService_DeleteAsset
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                type: object
                properties: {}
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
  /api/v1/auth/jwt/create:
    post:
      summary: JWT management
      operationId: AuthService_CreateJWT
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesCreateJWTResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/servicesCreateJWTRequest"
        required: true
      tags:
        - AuthService
  /api/v1/auth/jwt/refresh:
    post:
      operationId: AuthService_RefreshJWT
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesRefreshJWTResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/servicesRefreshJWTRequest"
        required: true
      tags:
        - AuthService
  /api/v1/auth/jwt/validate:
    post:
      operationId: AuthService_ValidateJWT
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesValidateJWTResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/servicesValidateJWTRequest"
        required: true
      tags:
        - AuthService
  /api/v1/holdings:
    get:
      operationId: StorageService_ListHoldings
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListHoldingsResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: portfolioId
          in: query
          required: false
          schema:
            type: string
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: assetId
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
      tags:
        - StorageService
    post:
      summary: --- Holdings operations ---
      operationId: StorageService_CreateHolding
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsHolding"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsHolding"
        description: asset_id, amount, decimals required. One of portfolio_id or
          account_id required. ID empty.
        required: true
      tags:
        - StorageService
  "/api/v1/holdings/{holding.id}":
    put:
      operationId: StorageService_UpdateHolding
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsHolding"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: holding.id
          description: Unique identifier (UUID)
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: string
                  format: int64
                  title: Value of the asset in the smallest unit
                decimals:
                  type: integer
                  format: int64
                  title: Number of decimal places for the amount
                assetId:
                  type: string
                  title: ID of the Asset
                accountId:
                  type: string
                  title: ID of the Account where the asset is held
                portfolioId:
                  type: string
                  title: ID of the Portfolio this holding belongs to
                createdAt:
                  type: string
                  format: date-time
                  title: Timestamp of creation
                updatedAt:
                  type: string
                  format: date-time
                  title: Timestamp of last update
              title: Must include ID and fields to update (e.g., amount)
        description: Must include ID and fields to update (e.g., amount)
        required: true
      tags:
        - StorageService
  "/api/v1/holdings/{id}":
    get:
      operationId: StorageService_GetHolding
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsHolding"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
  /api/v1/portfolios:
    get:
      operationId: StorageService_ListPortfolios
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListPortfoliosResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
      tags:
        - StorageService
    post:
      summary: --- Portfolio operations ---
      operationId: StorageService_CreatePortfolio
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsPortfolio"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsPortfolio"
        description: user_id and name are required. ID empty if server-generated.
        required: true
      tags:
        - StorageService
  "/api/v1/portfolios/{id}":
    get:
      operationId: StorageService_GetPortfolio
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsPortfolio"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
    delete:
      operationId: StorageService_DeletePortfolio
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                type: object
                properties: {}
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      tags:
        - StorageService
  "/api/v1/portfolios/{portfolio.id}":
    put:
      operationId: StorageService_UpdatePortfolio
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsPortfolio"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: portfolio.id
          description: Unique identifier (UUID)
          in: path
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  title: ID of the user owning this portfolio
                name:
                  type: string
                  title: User-defined name (e.g., "Long Term Crypto", "Trading")
                description:
                  type: string
                  title: Optional longer description
                data:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/protobufAny"
                  title: Additional data (e.g., strategy, notes, regulated balance of assets,
                    etc.)
                createdAt:
                  type: string
                  format: date-time
                  title: Timestamp of creation
                updatedAt:
                  type: string
                  format: date-time
                  title: Timestamp of last update
              title: Must include ID and fields to update
        description: Must include ID and fields to update
        required: true
      tags:
        - StorageService
  "/api/v1/portfolios/{portfolioId}/calculate-value":
    post:
      summary: Calculates the current total value of a portfolio in a specified
        currency.
      operationId: PortfolioService_CalculatePortfolioValue
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesPortfolioValueResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioServiceCalculatePortfolioValueBody"
        required: true
      tags:
        - PortfolioService
  "/api/v1/portfolios/{portfolioId}/performance":
    post:
      summary: Retrieves performance metrics for a portfolio over a specified period.
      operationId: PortfolioService_GetPortfolioPerformance
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesPortfolioPerformanceResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioServiceGetPortfolioPerformanceBody"
        required: true
      tags:
        - PortfolioService
  /api/v1/prices:
    delete:
      operationId: StorageService_DeletePrices
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                type: object
                properties: {}
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: assetId
          in: query
          required: false
          schema:
            type: string
        - name: baseAssetId
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: sourceId
          description: Filter by source
          in: query
          required: false
          schema:
            type: string
      tags:
        - StorageService
    post:
      summary: |-
        --- Price operations ---
        Assuming prices are immutable once created, so no UpdatePrice.
      operationId: StorageService_CreatePrice
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modelsPrice"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsPrice"
        required: true
      tags:
        - StorageService
  /api/v1/prices/bulk:
    post:
      operationId: StorageService_CreatePrices
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesCreatePricesResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/modelsPrice"
        required: true
      tags:
        - StorageService
  /api/v1/prices/fetch-external:
    post:
      summary: Triggers fetching of latest prices from configured external sources and
        stores them using StorageService.
      operationId: PriceService_FetchExternalPrices
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesFetchExternalPricesResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/servicesFetchExternalPricesRequest"
        required: true
      tags:
        - PriceService
  "/api/v1/prices/{assetId}/{baseAssetId}/history":
    get:
      operationId: StorageService_ListPriceHistory
      responses:
        "200":
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/servicesListPriceHistoryResponse"
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
        - name: baseAssetId
          in: path
          required: true
          schema:
            type: string
        - name: from
          description: Start of the time range
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          description: End of the time range
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: sourceId
          description: Filter by source
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          description: Pagination for large history
          in: query
          required: false
