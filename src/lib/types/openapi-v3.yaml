components:
  schemas:
    AssetServiceEnrichAssetDataBody:
      type: object
      properties:
        sources:
          type: array
          items:
            type: string
          title: 'Optional: specify sources like "market_cap_provider",
            "fundamental_data_provider"'
    PortfolioServiceCalculatePortfolioValueBody:
      type: object
      properties:
        quoteAssetId:
          type: string
          title: e.g., "USD", "BTC" - the currency to calculate value in
        atTime:
          type: string
          format: date-time
          title: "Optional: Calculate value at a specific point in time (requires price
            history)"
    PortfolioServiceGetPortfolioPerformanceBody:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        benchmarkAssetId:
          type: string
          title: "Optional: Asset to compare performance against (e.g., BTC, SPY)"
    RuleServiceCancelRuleExecutionBody:
      type: object
      properties:
        reason:
          type: string
    RuleServiceDisableRuleBody:
      type: object
    RuleServiceEnableRuleBody:
      type: object
      title: Rule status management messages
    RuleServiceExecuteRuleAsyncBody:
      type: object
      properties:
        dryRun:
          type: boolean
        executionContext:
          type: string
    RuleServiceExecuteRuleBody:
      type: object
      properties:
        dryRun:
          type: boolean
        executionContext:
          type: string
      title: Rule execution messages
    RuleServicePauseRuleBody:
      type: object
      properties:
        reason:
          type: string
    RuleServiceResumeRuleBody:
      type: object
    RuleServiceSimulateRuleBody:
      type: object
      properties:
        simulateAt:
          type: string
          format: date-time
        includeCosts:
          type: boolean
    UserServiceUpdateUserPreferencesBody:
      type: object
      properties:
        preferencesToUpdate:
          type: object
          additionalProperties:
            type: string
          title: Only the preferences to change
        updateMask:
          type: string
          title: Alternatively, use a mask to specify which keys in the map to
            update/delete
    modelsAccount:
      type: object
      properties:
        id:
          type: string
          title: Unique identifier (UUID)
        userId:
          type: string
          title: ID of the user owning this account
        name:
          type: string
          title: User-defined name (e.g., "My Binance Spot", "Ledger Nano S")
        description:
          type: string
          title: Optional longer description
        type:
          $ref: "#/components/schemas/modelsAccountType"
        data:
          type: object
          additionalProperties:
            type: string
          description: Flexible map for connection parameters, API keys, addresses etc.
            Needs careful handling due to sensitive data.
        createdAt:
          type: string
          format: date-time
          title: Timestamp of creation
        updatedAt:
          type: string
          format: date-time
          title: Timestamp of last update
      description: >-
        Account represents a user's connection to an external financial entity

        (like an exchange account, bank account, or a self-custody wallet).

        It holds metadata and potentially credentials (in 'data' field) needed to interact.
    modelsAccountType:
      type: string
      enum:
        - ACCOUNT_TYPE_UNSPECIFIED
        - ACCOUNT_TYPE_WALLET
        - ACCOUNT_TYPE_EXCHANGE
        - ACCOUNT_TYPE_BANK
        - ACCOUNT_TYPE_BROKER
      default: ACCOUNT_TYPE_UNSPECIFIED
    modelsAsset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/modelsAssetType"
        symbol:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      description: Asset represents financial instrument (crypto, stock, etc.).
    modelsAssetType:
      type: string
      enum:
        - ASSET_TYPE_UNSPECIFIED
        - ASSET_TYPE_CRYPTOCURRENCY
        - ASSET_TYPE_STOCK
        - ASSET_TYPE_BOND
        - ASSET_TYPE_COMMODITY
        - ASSET_TYPE_FOREX
        - ASSET_TYPE_FUND
      default: ASSET_TYPE_UNSPECIFIED
    modelsExecutionStatus:
      type: string
      enum:
        - EXECUTION_STATUS_UNKNOWN
        - EXECUTION_STATUS_PENDING
        - EXECUTION_STATUS_IN_PROGRESS
        - EXECUTION_STATUS_COMPLETED
        - EXECUTION_STATUS_FAILED
        - EXECUTION_STATUS_CANCELLED
      default: EXECUTION_STATUS_UNKNOWN
      title: ExecutionStatus indicates the status of a rule execution
    modelsHolding:
      type: object
      properties:
        id:
          type: string
          title: Unique identifier (UUID)
        amount:
          type: string
          format: int64
          title: Value of the asset in the smallest unit
        decimals:
          type: integer
          format: int64
          title: Number of decimal places for the amount
        assetId:
          type: string
          title: ID of the Asset
        accountId:
          type: string
          title: ID of the Account where the asset is held
        portfolioId:
          type: string
          title: ID of the Portfolio this holding belongs to
        createdAt:
          type: string
          format: date-time
          title: Timestamp of creation
        updatedAt:
          type: string
          format: date-time
          title: Timestamp of last update
      description: >-
        Holding represents a specific quantity of an Asset held within an
        Account

        and associated with a Portfolio.
    modelsNotificationType:
      type: string
      enum:
        - NOTIFICATION_TYPE_UNSPECIFIED
        - NOTIFICATION_TYPE_ALERT
        - NOTIFICATION_TYPE_SYSTEM
        - NOTIFICATION_TYPE_REPORT
      default: NOTIFICATION_TYPE_UNSPECIFIED
      description: >-
        - NOTIFICATION_TYPE_ALERT: Rule-triggered alerts (price, portfolio,
        etc.)
         - NOTIFICATION_TYPE_SYSTEM: System status, sync, trade confirmations
         - NOTIFICATION_TYPE_REPORT: Scheduled reports (weekly, monthly)
      title: |-
        Simplified transport-focused notification types
        Business logic conditions moved to Rule system
    modelsPortfolio:
      type: object
      properties:
        id:
          type: string
          title: Unique identifier (UUID)
        userId:
          type: string
          title: ID of the user owning this portfolio
        name:
          type: string
          title: User-defined name (e.g., "Long Term Crypto", "Trading")
        description:
          type: string
          title: Optional longer description
        data:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/protobufAny"
          title: Additional data (e.g., strategy, notes, regulated balance of assets,
            etc.)
        createdAt:
          type: string
          format: date-time
          title: Timestamp of creation
        updatedAt:
          type: string
          format: date-time
          title: Timestamp of last update
      description: >-
        Portfolio represents a collection of holdings (assets) managed by a
        user.

        It's used for tracking performance and overall value.
    modelsPrice:
      type: object
      properties:
        id:
          type: string
          title: Unique identifier (UUID)
        sourceId:
          type: string
          title: Identifier for the source (e.g., "coingecko", "binance")
        assetId:
          type: string
          title: ID of the Asset whose price is represented
        baseAssetId:
          type: string
          title: ID of the Asset against which the price is quoted (e.g., USDT, USD, BTC)
        interval:
          type: string
          description: >-
            Interval defines the time period this price data represents.

            Examples: "1m", "5m", "1h", "4h", "1d", "tick", "latest".

            Empty or "latest" might indicate a snapshot price rather than a full candle.
        decimals:
          type: integer
          format: int64
          title: The decimals of the prices and volume
        last:
          type: string
          format: int64
          title: The latest price of the asset
        open:
          type: string
          format: int64
          description: >-
            OHLCV data - applicable when 'interval' represents a standard candle
            type (e.g., "1m", "1h").

            These fields might be 0 or unset if the price represents a 'latest' snapshot or 'tick'.
        high:
          type: string
          format: int64
        low:
          type: string
          format: int64
        close:
          type: string
          format: int64
        volume:
          type: string
          format: int64
          title: Trading volume during the interval
        timestamp:
          type: string
          format: date-time
          description: The closing time of the interval or the time of the snapshot/tick.
      description: |-
        Represents the price action of an Asset against a base Asset
        over a specific interval (candle/OHLCV) or as a latest snapshot.
    modelsRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          title: e.g., "target_allocation", "monthly_withdrawal", "stop_loss", "dca"
        portfolioId:
          type: string
        userId:
          type: string
        status:
          $ref: "#/components/schemas/modelsRuleStatus"
        configuration:
          type: object
          title: Flexible configuration for any rule type
        schedule:
          $ref: "#/components/schemas/modelsRuleSchedule"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      title: Rule defines a business rule that can be applied to portfolios
    modelsRuleExecution:
      type: object
      properties:
        id:
          type: string
        ruleId:
          type: string
        portfolioId:
          type: string
          title: Optional scope - inherited from rule if not specified
        userId:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/modelsExecutionStatus"
        errorMessage:
          type: string
        createdTransactionIds:
          type: array
          items:
            type: string
          title: Results produced by execution
        affectedHoldingIds:
          type: array
          items:
            type: string
        transactionsCreated:
          type: integer
          format: int32
          title: Execution metrics
        executionSummary:
          type: object
          title: Rule-type specific execution details
      title: RuleExecution represents a single execution of a rule
    modelsRuleSchedule:
      type: object
      properties:
        cronExpression:
          type: string
          title: Cron expression for scheduling
        timezone:
          type: string
          title: Timezone for execution
        oneTime:
          type: boolean
          title: If true, rule executes only once
        executeAfter:
          type: string
          format: date-time
          title: For delayed execution
      title: RuleSchedule defines when a rule should be executed
    modelsRuleStatus:
      type: string
      enum:
        - RULE_STATUS_UNKNOWN
        - RULE_STATUS_ACTIVE
        - RULE_STATUS_PAUSED
        - RULE_STATUS_DISABLED
        - RULE_STATUS_ERROR
      default: RULE_STATUS_UNKNOWN
      title: RuleStatus indicates the current status of a rule
    modelsSessionContext:
      type: object
      properties:
        telegramId:
          type: string
          title: Telegram user ID
        currentOperation:
          type: string
          description: 'Current operation: "trade", "portfolio_view", etc.'
        contextData:
          type: object
          additionalProperties:
            type: string
          title: Key-value context data
        expiresAt:
          type: string
          format: date-time
          title: Session expiration time
        conversationHistory:
          type: array
          items:
            type: string
          title: Recent conversation history
        state:
          type: string
          title: Current conversation state
      title: SessionContext represents user conversation state
    modelsTelegramAlert:
      type: object
      properties:
        id:
          type: string
          title: Alert ID
        telegramId:
          type: string
          title: Owner Telegram ID
        ruleId:
          type: string
          title: Link to Rule (business logic)
        customMessage:
          type: string
          title: Custom Telegram message template (optional)
        enabled:
          type: boolean
          title: Whether Telegram delivery is enabled
        createdAt:
          type: string
          format: date-time
        lastTriggered:
          type: string
          format: date-time
        triggerCount:
          type: integer
          format: int32
          title: Telegram delivery count
