        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rpcStatus"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelsTransaction"
        description: Required fields depend on type. ID empty.
        required: true
      tags:
        - StorageService
  "/api/v1/transactions/{id}":
